name: claude-usage-menu
options:
  bundleIdPrefix: com.claude
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""

targets:
  claude-usage-menu:
    type: application
    platform: macOS
    sources:
      - path: Sources
        type: group
      - path: Resources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claude.usage-menu
        PRODUCT_MODULE_NAME: ClaudeUsageMenu
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        LSUIElement: YES
    dependencies:
      - sdk: Security.framework
    entitlements:
      path: Resources/claude-usage-menu.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    scheme:
      testTargets:
        - claude-usage-menuTests

  claude-usage-menuTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        type: group
    dependencies:
      - target: claude-usage-menu
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claude.usage-menu-tests
        GENERATE_INFOPLIST_FILE: YES
