name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Archive
        run: |
          cd claude-usage-menu
          xcodebuild \
            -scheme claude-usage-menu \
            -configuration Release \
            -archivePath build/claude-usage-menu.xcarchive \
            DEVELOPMENT_TEAM=WVK7Q85W7R \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            archive

      - name: Export (Developer ID signed)
        run: |
          cd claude-usage-menu
          xcodebuild -exportArchive \
            -archivePath build/claude-usage-menu.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          cd claude-usage-menu
          ditto -c -k --keepParent build/export/claude-usage-menu.app claude-usage-menu.zip
          xcrun notarytool submit claude-usage-menu.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple
        run: |
          cd claude-usage-menu
          # The notarization ticket can lag behind notarytool's "Accepted" while it
          # propagates to Apple's CDN, so retry stapling until the ticket is found.
          for attempt in $(seq 1 8); do
            if xcrun stapler staple build/export/claude-usage-menu.app; then
              echo "Stapled app on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 8 ]; then
              echo "App stapling still failing after $attempt attempts" >&2
              exit 1
            fi
            echo "Ticket not available yet — retrying in 30s (attempt $attempt)"
            sleep 30
          done
          ditto -c -k --keepParent build/export/claude-usage-menu.app claude-usage-menu.zip

      - name: Build drag-and-drop DMG
        run: |
          cd claude-usage-menu
          brew install create-dmg

          # Stage only the (already signed + stapled) app; create-dmg adds the
          # "Applications" drop link so users can drag the app onto it to install.
          rm -rf dmg_staging
          mkdir -p dmg_staging
          cp -R build/export/claude-usage-menu.app dmg_staging/

          # create-dmg occasionally returns a non-zero exit code on CI even when it
          # succeeds (Finder/AppleScript timing), so don't fail here — we verify the
          # artifact exists right after and fall back if it is missing.
          create-dmg \
            --volname "Claude Usage Menu" \
            --window-pos 200 120 \
            --window-size 640 400 \
            --icon-size 120 \
            --icon "claude-usage-menu.app" 160 200 \
            --hide-extension "claude-usage-menu.app" \
            --app-drop-link 480 200 \
            --no-internet-enable \
            claude-usage-menu.dmg \
            dmg_staging || true

          # Fallback: a plain DMG that still has the drag-and-drop Applications link,
          # in case create-dmg's window-layout step fails on the runner.
          if [ ! -f claude-usage-menu.dmg ]; then
            echo "create-dmg produced no DMG — falling back to hdiutil"
            ln -s /Applications dmg_staging/Applications
            hdiutil create \
              -volname "Claude Usage Menu" \
              -srcfolder dmg_staging \
              -ov -format UDZO \
              claude-usage-menu.dmg
          fi

          # Sign the DMG container itself with Developer ID so Gatekeeper accepts
          # the disk image unambiguously (the app inside is already signed).
          codesign --force --timestamp \
            --sign "Developer ID Application" \
            claude-usage-menu.dmg

          ls -lh claude-usage-menu.dmg
          codesign --verify --verbose claude-usage-menu.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          cd claude-usage-menu
          xcrun notarytool submit claude-usage-menu.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple DMG
        run: |
          cd claude-usage-menu
          # Same propagation race as the app staple — retry until the ticket lands.
          for attempt in $(seq 1 8); do
            if xcrun stapler staple claude-usage-menu.dmg; then
              echo "Stapled DMG on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 8 ]; then
              echo "DMG stapling still failing after $attempt attempts" >&2
              exit 1
            fi
            echo "DMG ticket not available yet — retrying in 30s (attempt $attempt)"
            sleep 30
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-usage-menu/claude-usage-menu.zip
            claude-usage-menu/claude-usage-menu.dmg
          generate_release_notes: true
