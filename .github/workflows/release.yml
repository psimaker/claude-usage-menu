name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Archive
        run: |
          cd claude-usage-systray
          xcodebuild \
            -scheme ClaudeUsageSystray \
            -configuration Release \
            -archivePath build/ClaudeUsageSystray.xcarchive \
            archive

      - name: Export (Developer ID signed)
        run: |
          cd claude-usage-systray
          xcodebuild -exportArchive \
            -archivePath build/ClaudeUsageSystray.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          cd claude-usage-systray
          ditto -c -k --keepParent build/export/ClaudeUsageSystray.app ClaudeUsageSystray.zip
          xcrun notarytool submit ClaudeUsageSystray.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple
        run: |
          cd claude-usage-systray
          xcrun stapler staple build/export/ClaudeUsageSystray.app
          ditto -c -k --keepParent build/export/ClaudeUsageSystray.app ClaudeUsageSystray.zip

      - name: Build drag-and-drop DMG
        run: |
          cd claude-usage-systray
          brew install create-dmg

          # Stage only the (already signed + stapled) app; create-dmg adds the
          # "Applications" drop link so users can drag the app onto it to install.
          rm -rf dmg_staging
          mkdir -p dmg_staging
          cp -R build/export/ClaudeUsageSystray.app dmg_staging/

          # create-dmg occasionally returns a non-zero exit code on CI even when it
          # succeeds (Finder/AppleScript timing), so don't fail here — we verify the
          # artifact exists right after and fall back if it is missing.
          create-dmg \
            --volname "Claude Usage Systray" \
            --window-pos 200 120 \
            --window-size 640 400 \
            --icon-size 120 \
            --icon "ClaudeUsageSystray.app" 160 200 \
            --hide-extension "ClaudeUsageSystray.app" \
            --app-drop-link 480 200 \
            --no-internet-enable \
            ClaudeUsageSystray.dmg \
            dmg_staging || true

          # Fallback: a plain DMG that still has the drag-and-drop Applications link,
          # in case create-dmg's window-layout step fails on the runner.
          if [ ! -f ClaudeUsageSystray.dmg ]; then
            echo "create-dmg produced no DMG — falling back to hdiutil"
            ln -s /Applications dmg_staging/Applications
            hdiutil create \
              -volname "Claude Usage Systray" \
              -srcfolder dmg_staging \
              -ov -format UDZO \
              ClaudeUsageSystray.dmg
          fi

          ls -lh ClaudeUsageSystray.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          cd claude-usage-systray
          xcrun notarytool submit ClaudeUsageSystray.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple DMG
        run: |
          cd claude-usage-systray
          xcrun stapler staple ClaudeUsageSystray.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-usage-systray/ClaudeUsageSystray.zip
            claude-usage-systray/ClaudeUsageSystray.dmg
          generate_release_notes: true
