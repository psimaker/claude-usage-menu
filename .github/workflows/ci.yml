name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          # GitHub's default shell is `bash -e` WITHOUT pipefail, so without this
          # the step's exit code would be grep's — a test failure would match
          # "FAILED", grep would exit 0, and CI would stay green.
          set -o pipefail
          cd claude-usage-menu
          xcodebuild test \
            -project claude-usage-menu.xcodeproj \
            -scheme claude-usage-menu \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | grep -E "(Test Case|passed|failed|SUCCEEDED|FAILED)"
